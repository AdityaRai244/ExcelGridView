<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Performance Editable Canvas Grid</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="grid-container" id="gridContainer">
        <canvas id="gridCanvas"></canvas>
        <div class="scroll-pane" id="scrollPane">
            <div class="scroll-content" id="scrollContent"></div>
        </div>
       
        <div id="inputWrapper" style="position: relative; z-index: 10;">
            <input type="text" id="cellInput"
                style="position: absolute;  border: 2px solid #1a73e8; outline: none; font-size: 13px; padding: 0 5px; background: white;" />
            <div id="popup"
                style="position: absolute; overflow: auto; top: 100%; left: 0; z-index: 99999; background: white; border: 1px solid #ccc;">
                this is a popup model
            </div>
        </div>
    </div>



    <script type="module" src="./dist/index.js"></script>


</body>

</html>
